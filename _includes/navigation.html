<header>
  <a id="skipToMainContent" href="#mainContent">Skip to Main Content</a>
  <nav>
    <a href="/" class="nav-home" aria-label="Home">MR</a>
    <ul>
      {% for item in site.data.navigation %}
      <li>
        <a href="{{ item.link }}" class="
          {%- if page.url == item.link -%}
            current
          {%- else -%}
            not-current
          {%- endif -%}
        ">{{ item.name }}</a>
      </li>
      {%- endfor -%}
      {%- if page.layout == 'post' -%}
      <li>
        <a href="/" class="current">Blog</a>
      </li>
      {%- endif -%}
    </ul>
    <div class="nav-actions">
      <a href="/feed.xml" id="rss-link" aria-label="RSS Feed">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="6.18" cy="17.82" r="2.18" />
          <path
            d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z" />
        </svg>
      </a>
      <button type="button" id="theme-toggle" role="switch" aria-label="Dark mode" aria-checked="false">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </button>
      <button type="button" id="nav-toggle" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
</header>
