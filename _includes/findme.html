<div class="about-cta findme">
  {% for item in site.data.findme %}
    {% if item.email %}
      <a class="cta-primary js-email" href="/about" data-u="mail" data-d="mattrugamas.com">{{ item.label }}</a>
    {% else %}
      <a class="{% if item.primary %}cta-primary{% else %}cta-secondary{% endif %}" href="{{ item.url }}" target="_blank" rel="noopener">{{ item.label }}</a>
    {% endif %}
  {% endfor %}
</div>
