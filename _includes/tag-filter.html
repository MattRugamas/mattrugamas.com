{% if site.data.tags.size > 0 %}
<nav class="tag-filter" aria-label="Filter posts by tag">
  <a href="/" class="tag-badge{% unless page.tag %} active{% endunless %}">All</a>
  {% for tag in site.data.tags %}
    <a href="/tags/{{ tag }}/" class="tag-badge{% if page.tag == tag %} active{% endif %}">{{ tag | capitalize }}</a>
  {% endfor %}
</nav>
{% endif %}
