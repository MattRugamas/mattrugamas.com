title: Matt Rugamas
tagline: Customers, product, and code
description: >
  Personal site of Matt Rugamas, a support engineer in Los Angeles
  working at the intersection of customers, product, and code.
url: https://mattrugamas.com
permalink: /:title

# SASS/SCSS
sass:
  style: compressed

# Google Analytics
google_analytics: G-EC57RQ9MNY

# Social
twitter:
  card: summary_large_image
github_username: MattRugamas

# Build settings
repository: MattRugamas/mattrugamas.com
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - rouge
  - jekyll-tidy
  - jekyll-figure
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Plugin Settings
jekyll-figure:
  paragraphs: false

# Files Jekyll should not copy into the built site
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - scripts
  - .github

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "tags"
      type: "pages"
    values:
      layout: "tag"
  - scope:
      path: ""
    values:
      layout: "default"
      # Default social share card (Open Graph / Twitter); pages may override.
      image:
        path: /assets/img/site/social-card.png
        width: 1200
        height: 630
