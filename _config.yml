title: Matt Rugamas
tagline: Customers, code, and product
description: >
  Personal site of Matt Rugamas, a Senior Support and Accessibility Engineer
  in Los Angeles, working at the intersection of customers, code and product.
url: https://mattrugamas.com
permalink: /:title

# SASS/SCSS
sass:
  style: compressed

# Google Analytics
google_analytics: G-EC57RQ9MNY

# Social
instagram_username: MattRugamas
github_username: MattRugamas

# Build settings
repository: MattRugamas/mattrugamas.com
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - rouge
  - jekyll-tidy
  - jekyll-figure
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Plugin Settings
jekyll-figure:
  paragraphs: false

# Files Jekyll should not copy into the built site
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - scripts
  - .github

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
